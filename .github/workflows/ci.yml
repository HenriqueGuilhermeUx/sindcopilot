name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reconstruct bootstrap files when necessary
        run: |
          if [ -d .bootstrap ]; then
            mkdir -p src/server/services supabase/migrations
            cat .bootstrap/router.* > src/server/router.ts
            cat .bootstrap/data.* > src/server/services/data.ts
            cat .bootstrap/migration.* > supabase/migrations/0001_initial.sql
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: ignore

      - name: Tests
        run: npm test

      - name: Build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder
        run: npm run build
